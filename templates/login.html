<!DOCTYPE html>
<html>

<head>

<title>CLV Platform Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
height:100vh;

background:
radial-gradient(circle at 15% 20%, rgba(255,255,255,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,0.15), transparent 40%),
linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);

display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

/* bubbles */

.bubble{
position:fixed;
border-radius:50%;
background:rgba(255,255,255,0.1);
animation:float 16s infinite ease-in-out;
z-index:0;
}

.b1{
width:220px;
height:220px;
top:15%;
left:10%;
}

.b2{
width:150px;
height:150px;
bottom:20%;
right:15%;
animation-duration:20s;
}

.b3{
width:90px;
height:90px;
top:75%;
left:15%;
animation-duration:14s;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0px)}
}


/* welcome */

.welcome{
position:absolute;
top:70px;
text-align:center;
z-index:1;
}

.welcome h1{
font-size:38px;
margin:0;
}

.welcome p{
opacity:0.9;
}


/* login card */

.login-box{
background:white;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
color:black;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
position:relative;
z-index:2;
}

.login-box h2{
margin-bottom:5px;
}

.login-box small{
color:gray;
}

.login-box input{
width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
border:1px solid #ddd;
}

.login-box button{
width:100%;
padding:12px;
margin-top:20px;
background:linear-gradient(90deg,#2563eb,#3b82f6);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

/* footer */

.footer{
position:absolute;
bottom:30px;
font-size:13px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>

<div class="welcome">
<h1>Welcome to CLV Intelligence Platform</h1>
<p>AI Powered Customer Lifetime Value Prediction System</p>
</div>

<div class="login-box">

<h2>Login to Continue</h2>
<small>Access your analytics dashboard</small>

<form method="POST">

<input
type="email"
name="username"
placeholder="Enter Email ID"
pattern="[a-zA-Z0-9._%+-]+@gma+il+.co\m"
title="Must be a Gmail address"
required>

<input
type="password"
name="password"
placeholder="Password (min 8 characters with number)"
pattern="(?=.*[0-9]).{8,}"
title="Password must contain at least 8 characters and one number"
required>

<button type="submit">Login</button>

</form>

</div>

<div class="footer">
Customer Lifetime Value Intelligence System © 2026
</div>

</body>
</html>
